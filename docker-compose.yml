version: "3.9"

# MongoDB runs on YOUR LOCAL MACHINE (not in Docker).
# Containers reach it via host.docker.internal (macOS/Windows Docker Desktop).
# Make sure MongoDB is running locally on port 27017 before starting.

services:
  # ── Redis (needed by Celery) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ytmanager_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmanager_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override MongoDB URI to reach the host machine's local MongoDB
      MONGODB_URI: mongodb://host.docker.internal:27017
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5174}
    volumes:
      - backend_storage:/app/storage
      - backend_assets:/app/assets
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compatibility

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmanager_celery
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_storage:/app/storage
      - backend_assets:/app/assets
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ytmanager_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      - backend

volumes:
  redis_data:
  backend_storage:
  backend_assets:
