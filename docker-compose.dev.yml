# Development compose:
# - bind-mount source code so changes are visible inside containers
# - run hot-reload servers instead of production commands
# - keep dependency directories in named volumes so host files do not hide them

services:
  redis:
    image: redis:7-alpine
    container_name: ytmanager_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmanager_backend_dev
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5174}
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
      - backend_assets:/app/assets
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytmanager_celery_dev
    restart: unless-stopped
    command: watchfiles "celery -A tasks.celery_app worker --loglevel=info --concurrency=2" /app
    env_file: .env
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
      - backend_assets:/app/assets
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ytmanager_frontend_dev
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 5173
    env_file: ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  redis_data:
  backend_storage:
  backend_assets:
  frontend_node_modules:
